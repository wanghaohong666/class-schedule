<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="初二1班智能课程表 - 实时课表、考试倒计时、暗黑模式、课程搜索">
<title>初二1班智能课程表</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<style>
/* ===== CSS Variables ===== */
:root {
  --bg-gradient: linear-gradient(165deg, #f9f4ea 0%, #efe4d4 45%, #f4efe6 100%);
  --card-bg: rgba(253,250,244,0.88);
  --card-border: rgba(196,175,145,0.30);
  --card-shadow: 0 2px 20px rgba(120,80,40,0.07), 0 1px 3px rgba(120,80,40,0.04);
  --text-primary: #2d2318;
  --text-secondary: #8b5e3c;
  --text-muted: #a09080;
  --accent: #8b5e3c;
  --accent-light: #c49a6c;
  --accent-glow: rgba(160,110,60,0.25);
  --banner-bg: linear-gradient(165deg, #3d2e1e 0%, #2a1f14 100%);
  --banner-text: #f8f2e8;
  --table-header-bg: linear-gradient(165deg, #3d2e1e 0%, #2a1f14 100%);
  --table-header-text: #f8f2e8;
  --cell-morning: rgba(210,218,235,0.55);
  --cell-afternoon: rgba(248,236,210,0.55);
  --cell-memorize: rgba(200,228,210,0.50);
  --cell-break: rgba(228,215,238,0.50);
  --cell-hover: rgba(160,110,60,0.12);
  --cell-current: rgba(160,110,60,0.22);
  --cell-search-hit: rgba(230,190,80,0.35);
  --border-light: rgba(180,155,125,0.20);
  --tab-bg: rgba(240,230,215,0.55);
  --tab-active-bg: #8b5e3c;
  --tab-active-text: #f8f2e8;
  --tab-text: #8b5e3c;
  --modal-overlay: rgba(20,15,10,0.55);
  --modal-bg: rgba(253,250,244,0.96);
  --input-bg: rgba(250,245,238,0.75);
  --input-border: rgba(196,175,145,0.35);
}

body.dark {
  --bg-gradient: linear-gradient(165deg, #1a120c 0%, #241810 45%, #160f09 100%);
  --card-bg: rgba(35,25,16,0.84);
  --card-border: rgba(140,110,70,0.18);
  --card-shadow: 0 4px 28px rgba(0,0,0,0.55), 0 1px 2px rgba(0,0,0,0.2);
  --text-primary: #ebe0d0;
  --text-secondary: #c49a6c;
  --text-muted: #8a7860;
  --accent: #c49a6c;
  --accent-light: #8b5e3c;
  --accent-glow: rgba(180,140,100,0.35);
  --banner-bg: linear-gradient(165deg, #352418 0%, #241810 100%);
  --banner-text: #ebe0d0;
  --table-header-bg: linear-gradient(165deg, #352418 0%, #241810 100%);
  --table-header-text: #ebe0d0;
  --cell-morning: rgba(30,28,55,0.35);
  --cell-afternoon: rgba(55,35,18,0.32);
  --cell-memorize: rgba(8,48,30,0.30);
  --cell-break: rgba(35,15,45,0.28);
  --cell-hover: rgba(180,140,100,0.15);
  --cell-current: rgba(180,140,100,0.25);
  --cell-search-hit: rgba(200,160,60,0.22);
  --border-light: rgba(140,110,70,0.18);
  --tab-bg: rgba(35,25,16,0.55);
  --tab-active-bg: #c49a6c;
  --tab-active-text: #1a120c;
  --tab-text: #c49a6c;
  --modal-overlay: rgba(10,8,5,0.75);
  --modal-bg: rgba(35,25,16,0.96);
  --input-bg: rgba(35,25,16,0.60);
  --input-border: rgba(140,110,70,0.30);}

body.dark .banner-time { background:rgba(255,255,255,0.08); }

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; scroll-behavior:smooth; }
body {
  font-family:'Microsoft YaHei','PingFang SC','Helvetica Neue',sans-serif;
  background:var(--bg-gradient);
  min-height:100vh;
  color:var(--text-primary);
  transition:background 0.6s cubic-bezier(0.25,0.46,0.45,0.94), color 0.5s ease;
  padding:16px;
  -webkit-tap-highlight-color:transparent;
}

/* ===== Banner ===== */
.banner {
  position:sticky; top:12px; z-index:900;
  background:var(--banner-bg);
  color:var(--banner-text);
  border-radius:14px;
  padding:12px 24px;
  display:flex; align-items:center; flex-wrap:wrap; gap:8px 18px;
  box-shadow:0 2px 16px rgba(0,0,0,0.15);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  transition:background 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
  letter-spacing:0.01em;
}
.banner-dot {
  width:10px; height:10px; border-radius:50%; flex-shrink:0;
  box-shadow: 0 0 6px rgba(52,211,153,0.4);
}
.banner-dot.active { background:#34d399; animation:pulse-dot 1.2s infinite; }
.banner-dot.break  { background:#fbbf24; animation:pulse-dot 1.2s infinite; }
.banner-dot.idle   { background:#94a3b8; }
@keyframes pulse-dot {
  0%,100% { box-shadow:0 0 0 0 rgba(52,211,153,0.5); }
  50%     { box-shadow:0 0 0 8px rgba(52,211,153,0); }
}
.banner-text { font-size:1.05rem; font-weight:700; flex:1 1 280px; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.banner-time { font-size:0.9rem; font-variant-numeric:tabular-nums; flex-shrink:0; padding:3px 12px; background:rgba(255,255,255,0.18); border-radius:10px; }
/* countdown inline in banner */
.banner .cd-urgent { color: #fca5a5; animation: countdown-pulse 1.5s ease-in-out infinite; }
@keyframes countdown-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
/* banner variants */
.banner.holiday { background:linear-gradient(135deg, #f59e0b 0%, #ef4444 100%); }
.banner.weekend { background:linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%); }
.banner.preholiday { background:linear-gradient(135deg, #f97316 0%, #ef4444 100%); }

/* ===== Main Layout ===== */
.main-wrap {
  max-width:none; margin:6px auto 18px; padding:0 16px;
  display:flex; gap:22px; flex-wrap:wrap;
}
.timetable-col { flex:3; min-width:320px; }
.sidebar-col   { flex:0 0 300px; min-width:260px; display:flex; flex-direction:column; gap:20px; }

/* ===== Card ===== */
.card {
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:14px;
  padding:20px 22px;
  box-shadow:var(--card-shadow);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  transition:background 0.5s cubic-bezier(0.25,0.46,0.45,0.94), border-color 0.5s ease, box-shadow 0.5s ease;
}

/* ===== Toolbar ===== */
.toolbar {
  display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:10px;
}
.search-box {
  flex:1; min-width:160px;
  background:var(--input-bg);
  border:1.5px solid var(--input-border);
  border-radius:12px;
  padding:10px 16px;
  font-size:0.95rem;
  color:var(--text-primary);
  outline:none;
  transition:all 0.25s ease;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.search-box::placeholder { color:var(--text-muted); }
.search-box:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
.btn {
  border:none; border-radius:12px; padding:10px 18px; font-size:0.9rem;
  font-weight:600; cursor:pointer; transition:all 0.25s ease;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:flex; align-items:center; gap:6px;
  white-space:nowrap;
}
.btn-theme {
  background:var(--tab-bg); color:var(--tab-text);
  border:1.5px solid var(--border-light);
}
.btn-theme:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn-notify {
  background:var(--tab-bg); color:var(--tab-text);
  border:1.5px solid var(--border-light);
}
.btn-notify:hover { background:#34d399; color:#fff; border-color:#34d399; }
.btn-notify.granted { background:#34d399; color:#fff; border-color:#34d399; }

/* ===== Timetable Grid ===== */
/* day-today column highlight */
.timetable thead th.day-today {
  font-weight:900 !important;
}
.timetable thead th.day-today::after {
  content:"今";
  font-size:0.65rem;
  font-weight:600;
  background:var(--accent);
  color:#fff;
  border-radius:8px;
  padding:1px 5px;
  margin-left:3px;
  vertical-align:middle;
}
.timetable tbody td.day-today {
}
.table-scroll { overflow-x:auto; border-radius:12px; }
.timetable {
  width:100%; border-collapse:separate; border-spacing:0;
  min-width:720px;
}
.timetable thead th {
  background:var(--table-header-bg);
  color:var(--table-header-text);
  padding:13px 8px; font-size:0.95rem; font-weight:600;
  letter-spacing:0.03em;
  position:sticky; top:0; z-index:2;
  text-align:center;
}
.timetable thead th:first-child {
  border-radius:12px 0 0 0;
  width:100px;
}
.timetable thead th:last-child { border-radius:0 12px 0 0; }
.timetable tbody td {
  padding:9px 5px; text-align:center; font-size:0.9rem;
  font-weight:500; cursor:pointer; position:relative;
  transition:transform 0.2s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.2s ease, background 0.25s ease;
  border-bottom:1px solid var(--border-light);
}
.timetable tbody td:first-child {
  font-size:0.8rem; line-height:1.4; cursor:default; font-weight:500;
  color:var(--text-muted); min-width:100px;
}
.timetable tbody td:first-child .period-name { font-weight:700; color:var(--text-primary); font-size:0.88rem; }
.timetable tbody td.cell-course:hover {
  background:var(--cell-hover); transform:scale(1.04); z-index:1;
  border-radius:6px; box-shadow:0 2px 12px var(--accent-glow);
}
/* cell types */
.cell-morning   { background:var(--cell-morning); }
.cell-afternoon { background:var(--cell-afternoon); }
.cell-memorize  { background:var(--cell-memorize); }
.cell-break     { background:var(--cell-break); }

/* current period pulse */
@keyframes pulse-glow {
  0%,100% { box-shadow:inset 0 0 0 0 var(--accent-glow), 0 0 0 0 var(--accent-glow); }
  50%     { box-shadow:inset 0 0 18px 3px var(--accent-glow), 0 0 20px 4px var(--accent-glow); }
}
.cell-current {
  background:var(--cell-current) !important;
  animation:pulse-glow 2s ease-in-out infinite;
  border-radius:8px;
  font-weight:800 !important;
}

/* search highlight */
.cell-hit {
  background:var(--cell-search-hit) !important;
  border-radius:8px;
  font-weight:800 !important;
}

/* ===== Sidebar ===== */
.date-big { font-size:3.4rem; font-weight:700; color:var(--accent); line-height:1; letter-spacing:-0.02em; }
.weekday-label { font-size:1.2rem; color:var(--text-muted); margin:4px 0 6px; }
.week-num { font-size:0.95rem; color:var(--accent); font-weight:700; margin-bottom:16px; }
.summary-box { background:rgba(160,110,60,0.08); border-radius:14px; padding:18px; font-size:0.95rem; line-height:1.7; }
.legend-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px; }
.legend-item { display:flex; align-items:center; gap:8px; font-size:0.85rem; }
.legend-swatch { width:18px; height:18px; border-radius:5px; flex-shrink:0; }
.swatch-morning   { background:var(--cell-morning); border:1px solid rgba(165,180,252,0.4); }
.swatch-afternoon { background:var(--cell-afternoon); border:1px solid rgba(252,211,77,0.4); }
.swatch-memorize  { background:var(--cell-memorize); border:1px solid rgba(110,231,183,0.4); }
.swatch-break     { background:var(--cell-break); border:1px solid rgba(196,181,253,0.4); }
.quote-card { background:linear-gradient(165deg, #5a3e2b 0%, #3d2e1e 100%); color:#f8f2e8; }
.quote-card h3 { color:#fff; border-bottom-color:rgba(255,255,255,0.3); }
.quote-text { font-style:italic; font-size:1.05rem; line-height:1.6; text-align:center; padding:12px 0; }
.quote-author { text-align:right; font-size:0.9rem; opacity:0.85; }

/* ===== Modal ===== */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:1000;
  background:var(--modal-overlay);
  align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
.modal-overlay.show { display:flex; }
.modal-box {
  background:var(--modal-bg);
  border:1px solid var(--card-border);
  border-radius:18px; padding:32px; max-width:420px; width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  text-align:center;
  animation:modal-in 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
}
@keyframes modal-in { from{opacity:0;transform:translateY(30px) scale(0.95);} to{opacity:1;transform:translateY(0) scale(1);} }
.modal-course { font-size:2rem; font-weight:800; color:var(--accent); margin-bottom:6px; }
.modal-period { font-size:1.1rem; color:var(--text-muted); margin-bottom:4px; }
.modal-time   { font-size:1.3rem; font-weight:700; color:var(--text-primary); margin-bottom:4px; }
.modal-day    { font-size:1rem; color:var(--text-muted); }
.modal-close {
  margin-top:20px; padding:10px 28px; border:none; border-radius:12px;
  background:var(--accent); color:#fff; font-size:1rem; font-weight:600; cursor:pointer;
  transition:all 0.25s ease;
}
.modal-close:hover { transform:scale(1.05); box-shadow:0 6px 20px var(--accent-glow); }


/* ===== Multi-Theme: Mint Green ===== */
[data-theme="mint"] {
  --bg-gradient: linear-gradient(165deg, #e8f0e6 0%, #d5e5d2 45%, #edf2eb 100%);
  --card-bg: rgba(248,252,246,0.88);
  --card-border: rgba(139,167,128,0.30);
  --card-shadow: 0 2px 20px rgba(80,120,60,0.06);
  --text-primary: #2d3624;
  --text-secondary: #4a6740;
  --text-muted: #8a9780;
  --accent: #4a6740;
  --accent-light: #8ba778;
  --accent-glow: rgba(100,140,70,0.25);
  --banner-bg: linear-gradient(165deg, #3d5030 0%, #2a3a22 100%);
  --banner-text: #edf2eb;
  --table-header-bg: linear-gradient(165deg, #3d5030 0%, #2a3a22 100%);
  --table-header-text: #edf2eb;
  --cell-morning: rgba(210,228,210,0.55);
  --cell-afternoon: rgba(240,230,200,0.50);
  --cell-memorize: rgba(195,220,195,0.52);
  --cell-break: rgba(220,225,210,0.48);
  --cell-hover: rgba(100,140,70,0.12);
  --cell-current: rgba(100,140,70,0.20);
  --cell-search-hit: rgba(220,180,60,0.35);
  --border-light: rgba(160,180,140,0.20);
  --tab-bg: rgba(230,238,225,0.55);
  --tab-active-bg: #4a6740;
  --tab-active-text: #f8faf6;
  --tab-text: #4a6740;
  --modal-overlay: rgba(20,30,15,0.55);
  --modal-bg: rgba(248,252,246,0.96);
  --input-bg: rgba(240,248,235,0.75);
  --input-border: rgba(139,167,128,0.35);}
html[data-theme="mint"] body.dark {
  --bg-gradient: linear-gradient(165deg, #121a10 0%, #1a2615 45%, #0e140c 100%);
  --card-bg: rgba(30,40,22,0.84);
  --card-border: rgba(100,140,70,0.18);
  --card-shadow: 0 4px 28px rgba(0,0,0,0.55);
  --text-primary: #e2e8d8;
  --text-secondary: #8ba778;
  --text-muted: #7a8a6a;
  --accent: #8ba778;
  --accent-light: #4a6740;
  --accent-glow: rgba(120,160,90,0.35);
  --banner-bg: linear-gradient(165deg, #2a3a22 0%, #1a2615 100%);
  --banner-text: #e2e8d8;
  --table-header-bg: linear-gradient(165deg, #2a3a22 0%, #1a2615 100%);
  --table-header-text: #e2e8d8;
  --cell-morning: rgba(20,30,15,0.35);
  --cell-afternoon: rgba(40,30,15,0.32);
  --cell-memorize: rgba(15,35,20,0.32);
  --cell-break: rgba(25,20,35,0.28);
  --cell-hover: rgba(120,160,90,0.15);
  --cell-current: rgba(120,160,90,0.25);
  --cell-search-hit: rgba(180,140,40,0.22);
  --border-light: rgba(100,140,70,0.18);
  --tab-bg: rgba(30,40,22,0.55);
  --tab-active-bg: #8ba778;
  --tab-active-text: #121a10;
  --tab-text: #8ba778;
  --modal-bg: rgba(30,40,22,0.96);
  --input-bg: rgba(30,40,22,0.60);
  --input-border: rgba(100,140,70,0.30);}

/* ===== Multi-Theme: Warm Orange ===== */
[data-theme="warm"] {
  --bg-gradient: linear-gradient(165deg, #faf0e4 0%, #f2dfc8 45%, #f6ece0 100%);
  --card-bg: rgba(253,248,240,0.88);

  --card-shadow: 0 2px 20px rgba(160,100,50,0.07);

html[data-theme="warm"] body.dark {
  --bg-gradient: linear-gradient(165deg, #201008 0%, #2a1810 45%, #180c06 100%);

/* ===== Multi-Theme: Morandi Gray ===== */
[data-theme="morandi"] {
  --bg-gradient: linear-gradient(165deg, #eae5de 0%, #d8d1c6 45%, #e8e3dc 100%);
  --card-bg: rgba(250,248,244,0.88);
  --card-border: rgba(180,170,155,0.28);
  --card-shadow: 0 2px 20px rgba(100,80,60,0.06);
  --text-primary: #2a2520;
  --text-secondary: #6b6055;
  --text-muted: #a09080;
  --accent: #6b6055;
  --accent-light: #a09080;
  --accent-glow: rgba(120,105,85,0.25);
  --banner-bg: linear-gradient(165deg, #3d3830 0%, #2a2520 100%);
  --banner-text: #e8e3dc;
  --table-header-bg: linear-gradient(165deg, #3d3830 0%, #2a2520 100%);

.theme-dot {

<!-- Detail Modal -->

<script>
// ===== DATA =====
const timetableData = {
  days: ['周一','周二','周三','周四','周五'],
  periods: [
    { name:'早读/晨练', time:'7:30-7:50',  duration:20, type:'break' },
    { name:'第1节',     time:'8:00-8:40',  duration:40, type:'morning' },
    { name:'第2节',     time:'8:55-9:35',  duration:40, type:'morning' },
    { name:'第3节',     time:'10:05-10:45',duration:40, type:'morning' },
    { name:'第4节',     time:'11:00-11:40',duration:40, type:'morning' },
    { name:'第5节',     time:'14:40-15:20',duration:40, type:'afternoon' },
    { name:'第6节',     time:'15:35-16:15',duration:40, type:'afternoon' },
    { name:'第7节',     time:'16:30-17:10',duration:40, type:'afternoon' },
    { name:'第8节',     time:'17:25-18:05',duration:40, type:'afternoon' },
    { name:'第9节',     time:'18:10-18:50',duration:40, type:'afternoon' },
    { name:'生地背书',  time:'18:50-19:30',duration:40, type:'memorize' }
  ],
  courses: [
    ['升旗','专题教育','历史','音乐','体育','语文','数学','综合实践','英语','地理','生地背书'],
    ['英语早读','英语','道法','物理','生物','体育','美术','语文','数学','数学','生地背书'],
    ['生物早读','生物','语文','道法','地理','英语','体育','数学','物理','语文','生地背书'],
    ['语文早读','语文','英语','地理','信息科技','数学','数学','物理','生物','生物','生地背书'],
    ['跑操','数学','语文','生物','历史','劳动','心理健康','英语','地理','地理','生地背书']
  ]
};

const dailyQuotes = [
  { text:'学而不思则罔，思而不学则殆。', author:'孔子' },
  { text:'书山有路勤为径，学海无涯苦作舟。', author:'韩愈' },
  { text:'读书破万卷，下笔如有神。', author:'杜甫' },
  { text:'黑发不知勤学早，白首方悔读书迟。', author:'颜真卿' },
  { text:'业精于勤，荒于嬉；行成于思，毁于随。', author:'韩愈' },
  { text:'一日之计在于晨，一年之计在于春。', author:'萧绎' },
  { text:'锲而不舍，金石可镂。', author:'荀子' }
];

// ===== HOLIDAYS (2026 China) =====
const holidays = [
  { name:'寒假',        start:'2026-01-18', end:'2026-03-01', totalDays:43 },
  { name:'端午节',      start:'2026-06-19', end:'2026-06-21', totalDays:3  },
  { name:'暑假',        start:'2026-07-11', end:'2026-08-31', totalDays:52 },
  { name:'国庆中秋',    start:'2026-10-01', end:'2026-10-08', totalDays:8  }
];

// 海口市考试时间（会考=八年级生物地理，中考=九年级）
const HUI_KAO_DATE = new Date(2026, 5, 27);   // 2026-06-27
const ZHONG_KAO_DATE = new Date(2027, 5, 25); // 2027-06-25

// 海口市期中/期末考试（各校自定，按校历估算）
const exams = [
  { name:'期中考试', start:'2026-04-27', end:'2026-04-29' },
  { name:'期末考试', start:'2026-07-06', end:'2026-07-09' },
  { name:'期中考试', start:'2026-11-02', end:'2026-11-04' },
  { name:'期末考试', start:'2027-01-11', end:'2027-01-13' }
];

function dateStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseDate(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }

function getHoliday(todayStr) {
  for (const h of holidays) {
    if (todayStr >= h.start && todayStr <= h.end) return h;
  }
  return null;
}

function getNextHoliday(todayStr) {
  for (const h of holidays) {
    if (h.start > todayStr) {
      // check if tomorrow is the start
      const tomorrow = new Date(parseDate(todayStr));
      tomorrow.setDate(tomorrow.getDate()+1);
      if (dateStr(tomorrow) === h.start) return h;
    }
  }
  return null;
}

function getFirstSchoolDayAfter(holidayEndStr) {
  let d = parseDate(holidayEndStr);
  d.setDate(d.getDate()+1);
  while (d.getDay()===0 || d.getDay()===6) d.setDate(d.getDate()+1);
  return d;
}

// ===== THEME MANAGER =====
const THEME_KEY = 'class-schedule-theme';
const themes = ['default', 'mint', 'warm', 'morandi'];

function setTheme(name) {
  document.documentElement.removeAttribute('data-theme');
  if (name && name !== 'default') {
    document.documentElement.setAttribute('data-theme', name);
  }
  localStorage.setItem(THEME_KEY, name);
  // Update dots
  document.querySelectorAll('.theme-dot').forEach(d => {
    d.classList.toggle('active', d.dataset.theme === name);
  });
}

function initTheme() {
  const saved = localStorage.getItem(THEME_KEY) || 'default';
  setTheme(saved);
  // Bind clicks
  document.querySelectorAll('.theme-dot').forEach(d => {
    d.addEventListener('click', () => setTheme(d.dataset.theme));
  });
}

// ===== STATE =====
let state = {
  currentPeriodIdx: -1,
  nextPeriodIdx: -1,
  searchQuery: '',
  darkMode: false,
  notifyGranted: false,
  notifiedPeriods: {}  // key: "dayIdx-periodIdx"
};

// ===== DOM REFS =====
const $ = (id) => document.getElementById(id);
const banner = $('banner');
const bannerDot = $('bannerDot');
const bannerText = $('bannerText');
const bannerTime = $('bannerTime');
const tableHead = $('tableHead');
const tableBody = $('tableBody');
const searchInput = $('searchInput');
const currentDate = $('currentDate');
const currentWeekday = $('currentWeekday');
const dailySummary = $('dailySummary');
const dailyQuote = $('dailyQuote');
const currentWeekNum = $('currentWeekNum');
const quoteAuthor = $('quoteAuthor');
const modalOverlay = $('modalOverlay');
const modalCourse = $('modalCourse');
const modalPeriod = $('modalPeriod');
const modalTime = $('modalTime');
const modalDay = $('modalDay');

// ===== INIT =====
function init() {
  // Dark mode persistence
  initDarkMode();
  // Themes
  initTheme();

  buildTable();
  updateAll();
  bindEvents();

  // refresh every second
  setInterval(updateAll, 1000);


  // check notification every 30s
  setInterval(checkNotifications, 30000);
}

// ===== COURSE COLORS =====
const courseColors = {
  '语文':'#E74C3C','数学':'#3498DB','英语':'#27AE60','物理':'#8E44AD','生物':'#16A085',
  '历史':'#E67E22','地理':'#2ECC71','道法':'#C0392B','体育':'#5D6D7E','音乐':'#E91E63',
  '美术':'#A1887F','信息科技':'#00BCD4','劳动':'#689F38','心理健康':'#FF7043',
  '专题教育':'#5C6BC0','综合实践':'#26A69A','生地背书':'#6D4C41',
  '升旗':'#90A4AE','跑操':'#90A4AE','英语早读':'#27AE60','生物早读':'#16A085','语文早读':'#E74C3C'
};
function getCourseColor(cname) { return courseColors[cname] || '#90A4AE'; }
// ===== BUILD TABLE =====
function buildTable() {
  // thead
  tableHead.innerHTML = '';
  const hr = document.createElement('tr');
  const th0 = document.createElement('th');
  th0.textContent = '时间/节次';
  hr.appendChild(th0);
  timetableData.days.forEach((d, i) => {
    const th = document.createElement('th');
    th.textContent = d;
    th.dataset.day = i;
    hr.appendChild(th);
  });
  tableHead.innerHTML = '';
  tableHead.appendChild(hr);

  // tbody
  tableBody.innerHTML = '';
  for (let r = 0; r < timetableData.periods.length; r++) {
    const period = timetableData.periods[r];
    const tr = document.createElement('tr');
    tr.dataset.row = r;
    // time column
    const tdTime = document.createElement('td');
    tdTime.innerHTML = '<span class="period-name">' + period.name + '</span><br>' + period.time;
    tr.appendChild(tdTime);
    // course columns
    for (let c = 0; c < timetableData.days.length; c++) {
      const td = document.createElement('td');
      const courseName = timetableData.courses[c][r];
      td.textContent = courseName;
      td.className = 'cell-course cell-' + period.type + ' cc-' + courseName;
      const cc = getCourseColor(courseName);
      td.style.borderLeft = '4px solid ' + cc;
      td.style.color = cc;
      td.style.fontWeight = '700';
      td.dataset.day = c;
      td.dataset.period = r;
      td.addEventListener('click', () => showModal(c, r));
      tr.appendChild(td);
    }
    tableBody.appendChild(tr);
  }
}

// ===== UPDATE ALL =====
function updateAll() {
  const now = new Date();
  const dow = now.getDay();
  const hours = now.getHours();
  const minutes = now.getMinutes();
  const seconds = now.getSeconds();
  const totalMinutes = hours * 60 + minutes;

  // Update sidebar
  const month = now.getMonth() + 1;
  const date = now.getDate();
  currentDate.textContent = month + '/' + date;
  const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  currentWeekday.textContent = weekdays[dow];

  // Week number (semester starts 2026-03-02 Monday, 海口)
  const semesterStart = new Date(2026, 2, 2);  // 2026-03-02 海口春季开学
  const weekDiff = Math.floor((now - semesterStart) / (7 * 24 * 60 * 60 * 1000)) + 1;
  currentWeekNum.textContent = '第 ' + weekDiff + ' 周';

  const qi = now.getDate() % dailyQuotes.length;
  dailyQuote.textContent = '"' + dailyQuotes[qi].text + '"';
  quoteAuthor.textContent = '—— ' + dailyQuotes[qi].author;

  // Find current/next period
  let cp = -1, np = -1;
  for (let i = 0; i < timetableData.periods.length; i++) {
    const p = timetableData.periods[i];
    const [sh, sm] = p.time.split('-')[0].split(':').map(Number);
    const [eh, em] = p.time.split('-')[1].split(':').map(Number);
    const st = sh * 60 + sm;
    const et = eh * 60 + em;
    if (totalMinutes >= st && totalMinutes <= et) { cp = i; break; }
    if (totalMinutes < st && np === -1) { np = i; }
  }
  state.currentPeriodIdx = cp;
  state.nextPeriodIdx = np;

  // Banner + Holiday / Weekend logic
  const todayStr = dateStr(now);
  const holiday = getHoliday(todayStr);
  const nextHoliday = getNextHoliday(todayStr);
  const isSchoolDay = (dow >= 1 && dow <= 5);
  let bannerMsg = '', dotClass = 'idle';
  const timeStr = hours.toString().padStart(2,'0') + ':' + minutes.toString().padStart(2,'0') + ':' + seconds.toString().padStart(2,'0');
  bannerTime.textContent = timeStr;

  // Clear banner classes
  banner.classList.remove('holiday','weekend','preholiday');

  if (holiday) {
    // ---- INSIDE HOLIDAY ----
    const endD = parseDate(holiday.end);
    const daysLeft = Math.ceil((endD - now) / 86400000);
    const firstDay = getFirstSchoolDayAfter(holiday.end);
    const fdDow = firstDay.getDay(); // 1-5
    const fdCourses = timetableData.courses[fdDow-1];
    const preview = fdCourses.slice(0,4).join('、');
    if (daysLeft <= 0) {
      bannerMsg = holiday.name + '最后一天！明天开学：' + preview;
    } else {
      bannerMsg = holiday.name + '假期中，还剩 ' + daysLeft + ' 天 | 开学第一天课程预览：' + preview;
    }
    dotClass = 'idle';
    banner.classList.add('holiday');
  } else if (nextHoliday && isSchoolDay && cp === -1 && np === -1) {
    // ---- PRE-HOLIDAY (all periods done, tomorrow is holiday) ----
    const lastPeriod = timetableData.periods[timetableData.periods.length-1];
    const [leh, lem] = lastPeriod.time.split('-')[1].split(':').map(Number);
    if (totalMinutes >= leh*60+lem) {
      bannerMsg = '即将放假！' + nextHoliday.name + '假期共 ' + nextHoliday.totalDays + ' 天';
      dotClass = 'idle';
      banner.classList.add('preholiday');
    }
  }

  // Fallback to normal logic if bannerMsg not set
  if (!bannerMsg) {
    if (!isSchoolDay) {
      // ---- WEEKEND (Sat/Sun) ----
      const monCourses = timetableData.courses[0];
      const preview = monCourses.slice(0,4).join('、');
      if (dow === 0) {
        bannerMsg = '周日 | 明天周一课程预览：' + preview;
      } else {
        // Saturday
        const daysToMon = 2; // Saturday -> 2 days to Monday
        bannerMsg = '周六 | 还剩 ' + daysToMon + ' 天到周一，课程预览：' + preview;
      }
      dotClass = 'idle';
      banner.classList.add('weekend');
    } else if (cp !== -1) {
      const p = timetableData.periods[cp];
      const [eh, em] = p.time.split('-')[1].split(':').map(Number);
      const et = eh * 60 + em;
      const left = et - totalMinutes;
      const leftMin = Math.floor(left);
      const leftSec = 59 - seconds;
      const courseName = timetableData.courses[dow - 1][cp];
      bannerMsg = '正在上课：' + courseName + ' | 下课还有 ' + leftMin + '分' + leftSec + '秒';
      dotClass = 'active';
    } else if (np !== -1) {
      const p = timetableData.periods[np];
      const [sh, sm] = p.time.split('-')[0].split(':').map(Number);
      const st = sh * 60 + sm;
      const left = st - totalMinutes;
      const leftMin = Math.floor(left);
      const leftSec = 59 - seconds;
      const courseName = timetableData.courses[dow - 1][np];
      bannerMsg = '课间休息 | 下节 ' + courseName + ' 还有 ' + leftMin + '分' + leftSec + '秒';
      dotClass = 'break';
    } else if (totalMinutes < 450) {
      const p = timetableData.periods[0];
      const [sh, sm] = p.time.split('-')[0].split(':').map(Number);
      const st = sh * 60 + sm;
      const left = st - totalMinutes;
      const leftMin = Math.floor(left);
      const leftSec = 59 - seconds;
      bannerMsg = '距离第一节课还有 ' + leftMin + '分' + leftSec + '秒';
      dotClass = 'idle';
    } else {
      bannerMsg = '今日课程已全部结束';
      dotClass = 'idle';
    }
  }

  // Countdown display merged into banner
  const huiDiff = Math.ceil((HUI_KAO_DATE - now) / 86400000);
  const zhongDiff = Math.ceil((ZHONG_KAO_DATE - now) / 86400000);
  let cdText = '';
  if (huiDiff > 0) {
    cdText += huiDiff <= 7 ? ' | 会考' + huiDiff + '天' : ' | 会考' + huiDiff + '天';
  }
  if (zhongDiff > 0) {
    cdText += ' | 中考';
    if (zhongDiff <= 30) cdText += zhongDiff + '天';
    else cdText += zhongDiff + '天';
  }

  // Exam countdown (nearest upcoming exam)
  let examText = '';
  for (const ex of exams) {
    const exStart = parseDate(ex.start);
    const exDiff = Math.ceil((exStart - now) / 86400000);
    if (exDiff > 0 && exDiff <= 14) {
      examText = ' | ' + ex.name + '还有' + exDiff + '天';
      break;
    }
  }

  // Tomorrow preview (Sun-Thu, >=18:00)
  let tomorrowText = '';
  if (!holiday && (dow >= 0 && dow <= 4) && totalMinutes >= 1080) { // 18:00 = 1080 min
    const tomorrowIdx = dow === 0 ? 0 : dow; // Sunday -> Monday (0)
    if (tomorrowIdx >= 0 && tomorrowIdx <= 4) {
      const tmCourses = timetableData.courses[tomorrowIdx];
      const tmList = tmCourses.slice(1).join('、'); // skip morning reading/flag raising
      tomorrowText = ' | 明日课程：' + tmList;
    }
  }
  bannerText.textContent = bannerMsg + cdText + examText + tomorrowText;
  bannerDot.className = 'banner-dot ' + dotClass;

  // Daily summary
  if (holiday) {
    dailySummary.innerHTML = '<strong>' + holiday.name + '</strong>假期中。<br>开学后共 <strong>11</strong> 节课/天。<br>好好休息，劳逸结合！';
  } else if (isSchoolDay) {
    const todayCourses = timetableData.courses[dow - 1];
    const totalClasses = todayCourses.filter(c => c && c !== '').length;
    let greeting = hours < 12 ? '上午好！' : hours < 18 ? '下午好！' : '晚上好！';
    let cpName = cp !== -1 ? timetableData.periods[cp].name : '休息时间';
    if (nextHoliday && cp===-1 && np===-1) {
      dailySummary.innerHTML = greeting + '<br>今日共 <strong>' + totalClasses + '</strong> 节课。<br>🎉 明天开始<strong>' + nextHoliday.name + '</strong>假期！';
    } else {
      dailySummary.innerHTML = greeting + '<br>今日共 <strong>' + totalClasses + '</strong> 节课。<br>当前是 ' + cpName + '。';
    }
  } else {
    const monCourses = timetableData.courses[0];
    const preview = monCourses.slice(0,4).join('、');
    dailySummary.innerHTML = '周末愉快！<br>周一课程预览：<strong>' + preview + '</strong><br>劳逸结合，效率更高！';
  }

  // Highlight cells
  highlightCells(isSchoolDay ? dow - 1 : -1, cp);
}

// ===== HIGHLIGHT CELLS =====
function highlightCells(todayIdx, cpIdx) {
  const allTds = tableBody.querySelectorAll('td.cell-course');
  const allRows = tableBody.querySelectorAll('tr');

  // Clear all
  allTds.forEach(td => td.classList.remove('cell-current', 'cell-current-td', 'cell-hit', 'day-today'));
  allRows.forEach(tr => tr.classList.remove('row-current'));
  // Clear thead day-today
  tableHead.querySelectorAll('th').forEach(th => th.classList.remove('day-today'));

  // Today column highlight (Mon=0 to Fri=4)
  if (todayIdx !== -1) {
    const ths = tableHead.querySelectorAll('th');
    ths.forEach(th => {
      if (parseInt(th.dataset.day) === todayIdx) {
        th.classList.add('day-today');
      }
    });
    allTds.forEach(td => {
      if (parseInt(td.dataset.day) === todayIdx) {
        td.classList.add('day-today');
      }
    });
  }

  // Row-level highlight: highlight the entire row of the current period
  if (cpIdx !== -1 && todayIdx !== -1) {
    allRows.forEach(tr => {
      if (parseInt(tr.dataset.row) === cpIdx) {
        tr.classList.add('row-current');
      }
    });
    allTds.forEach(td => {
      if (parseInt(td.dataset.day) === todayIdx && parseInt(td.dataset.period) === cpIdx) {
        td.classList.add('cell-current-td');
      }
    });
  }

  // Search highlight
  if (state.searchQuery.trim()) {
    const q = state.searchQuery.trim().toLowerCase();
    allTds.forEach(td => {
      if (td.textContent.toLowerCase().includes(q)) {
        td.classList.add('cell-hit');
      }
    });
  }
}

// ===== MODAL =====
function showModal(dayIdx, periodIdx) {
  const course = timetableData.courses[dayIdx][periodIdx];
  const period = timetableData.periods[periodIdx];
  modalCourse.textContent = course;
  modalPeriod.textContent = period.name;
  modalTime.textContent = period.time;
  modalDay.textContent = timetableData.days[dayIdx];
  modalOverlay.classList.add('show');
}

function hideModal() {
  modalOverlay.classList.remove('show');
}

// ===== NOTIFICATIONS =====
function requestNotification() {
  if (!('Notification' in window)) {
    alert('您的浏览器不支持桌面通知。');
    return;
  }
  if (Notification.permission === 'granted') {
    state.notifyGranted = true;
    updateNotifyBtn();
    return;
  }
  Notification.requestPermission().then(perm => {
    if (perm === 'granted') {
      state.notifyGranted = true;
      updateNotifyBtn();
    }
  });
}

function updateNotifyBtn() {
  const btn = $('btnNotify');
  const label = $('btnNotifyLabel');
  if (state.notifyGranted) {
    btn.classList.add('granted');
    label.textContent = '已开启';
  } else {
    btn.classList.remove('granted');
    label.textContent = '通知';
  }
}

function checkNotifications() {
  if (!state.notifyGranted) return;
  const now = new Date();
  const dow = now.getDay();
  if (dow < 1 || dow > 5) return;
  const hours = now.getHours();
  const minutes = now.getMinutes();
  const totalMinutes = hours * 60 + minutes;

  for (let i = 0; i < timetableData.periods.length; i++) {
    const p = timetableData.periods[i];
    const [sh, sm] = p.time.split('-')[0].split(':').map(Number);
    const st = sh * 60 + sm;
    const diff = st - totalMinutes;
    const key = (dow - 1) + '-' + i;
    if (diff > 0 && diff <= 5 && !state.notifiedPeriods[key]) {
      state.notifiedPeriods[key] = true;
      const course = timetableData.courses[dow - 1][i];
      new Notification('课程提醒', {
        body: '距离 ' + course + '（' + p.name + '）还有 ' + diff + ' 分钟，' + p.time,
        icon: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%236366f1%22 width=%22100%22 height=%22100%22 rx=%2220%22/%3E%3Ctext x=%2250%22 y=%2265%22 text-anchor=%22middle%22 font-size=%2245%22 fill=%22white%22%3E📅%3C/text%3E%3C/svg%3E'
      });
    }
  }

  // Reset notified keys for past periods (new day)
  Object.keys(state.notifiedPeriods).forEach(k => {
    const d = parseInt(k.split('-')[0]);
    if (d !== dow - 1) delete state.notifiedPeriods[k];
  });
}

// ===== THEME (Dark/Light) =====
function toggleTheme() {
  state.darkMode = !state.darkMode;
  document.body.classList.toggle('dark', state.darkMode);
  const icon = $('btnThemeIcon');
  const label = $('btnThemeLabel');
  if (state.darkMode) {
    icon.textContent = '☀️';
    label.textContent = '明亮';
  } else {
    icon.textContent = '🌙';
    label.textContent = '暗黑';
  }
  localStorage.setItem('class-schedule-dark', state.darkMode);
}
function initDarkMode() {
  const saved = localStorage.getItem('class-schedule-dark') === 'true';
  if (saved) { state.darkMode = true; document.body.classList.add('dark'); }
  const icon = $('btnThemeIcon');
  const label = $('btnThemeLabel');
  if (state.darkMode) { icon.textContent = '☀️'; label.textContent = '明亮'; }
}

// ===== EVENTS =====
function bindEvents() {
  // Theme (dark/light)
  $('btnTheme').addEventListener('click', toggleTheme);

  // Notify
  $('btnNotify').addEventListener('click', requestNotification);

  // Search
  searchInput.addEventListener('input', () => {
    state.searchQuery = searchInput.value;
    const now = new Date();
    const dow = now.getDay();
    const isSchoolDay = (dow >= 1 && dow <= 5);
    highlightCells(isSchoolDay ? dow - 1 : -1, state.currentPeriodIdx);
  });

  // Modal close
  $('modalClose').addEventListener('click', hideModal);
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) hideModal();
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') hideModal();
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      searchInput.focus();
    }
  });
}

// ===== START =====
init();

// Try auto-request notification (some browsers allow)
if ('Notification' in window && Notification.permission === 'granted') {
  state.notifyGranted = true;
  updateNotifyBtn();
}
</script>
