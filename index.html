<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初二1班智能课程表</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --morning-bg: #e3f2fd;
            --afternoon-bg: #fff9e6;
            --memorize-bg: #e8f5e9;
            --break-bg: #f3e5f5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .notification-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 18px 20px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .status-indicator {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 15px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .main-container {
            display: flex;
            max-width: 1400px;
            margin: 100px auto 30px;
            gap: 30px;
            flex-wrap: wrap;
        }

        .timetable-container {
            flex: 3;
            min-width: 300px;
            background: white;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .timetable-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 4px solid var(--secondary);
        }

        .timetable-header h1 {
            color: var(--primary);
            font-size: 32px;
            margin-bottom: 10px;
        }

        .timetable-header p {
            color: #666;
            font-size: 18px;
        }

        .canvas-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            background: #fafafa;
            padding: 15px;
        }

        #timetableCanvas {
            display: block;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }

        .sidebar {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .card h3 {
            color: var(--primary);
            margin: 0 0 25px 0;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
            font-size: 22px;
            display: flex;
            align-items: center;
        }

        .card h3 i {
            margin-right: 12px;
        }

        .date-display {
            text-align: center;
        }

        .date-large {
            font-size: 60px;
            font-weight: bold;
            color: var(--secondary);
            line-height: 1;
            margin-bottom: 8px;
        }

        .weekday {
            font-size: 22px;
            color: #666;
            margin-bottom: 25px;
        }

        .summary {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            font-size: 17px;
            line-height: 1.6;
            color: #555;
        }

        .legend {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 15px;
        }

        .legend-color {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .quote-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .quote-card h3 {
            color: white;
            border-bottom-color: rgba(255,255,255,0.3);
        }

        .quote-text {
            font-style: italic;
            font-size: 18px;
            line-height: 1.6;
            text-align: center;
            padding: 15px 0;
        }

        .author {
            text-align: right;
            font-size: 16px;
            opacity: 0.9;
            margin-top: 15px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        .control-btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 10px rgba(52, 152, 219, 0.3);
        }

        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(52, 152, 219, 0.4);
        }

        .control-btn.reset {
            background: var(--danger);
            box-shadow: 0 5px 10px rgba(231, 76, 60, 0.3);
        }

        @media (max-width: 1100px) {
            .main-container {
                flex-direction: column;
            }
            
            .sidebar {
                order: -1;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .timetable-container, .card {
                padding: 20px;
            }
            
            .timetable-header h1 {
                font-size: 26px;
            }
            
            .date-large {
                font-size: 48px;
            }
            
            .notification-banner {
                font-size: 17px;
                padding: 15px;
            }
            
            .legend {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .control-btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .date-large {
                font-size: 42px;
            }
            
            .timetable-header h1 {
                font-size: 22px;
            }
            
            .notification-banner {
                font-size: 15px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="notification-banner" id="notificationBanner">
        <div class="status-indicator" id="statusIndicator"></div>
        <span id="countdownText">正在加载倒计时...</span>
    </div>

    <div class="main-container">
        <div class="timetable-container">
            <div class="timetable-header">
                <h1>📅 初二1班课程表</h1>
                <p>2024-2025学年 | 实时倒计时系统</p>
            </div>
            
            <div class="canvas-wrapper">
                <canvas id="timetableCanvas" width="1000" height="750"></canvas>
            </div>
            
            <div class="controls">
                <button class="control-btn" id="refreshBtn">🔄 刷新课程表</button>
                <button class="control-btn reset" id="resetViewBtn">🔍 重置视图</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <h3><i>📅</i> 今日概览</h3>
                <div class="date-display">
                    <div class="date-large" id="currentDate">--</div>
                    <div class="weekday" id="currentWeekday">----</div>
                    <div class="summary" id="dailySummary">正在加载课程信息...</div>
                </div>
            </div>

            <div class="card">
                <h3><i>🎨</i> 图例说明</h3>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: var(--morning-bg);"></div>
                        <span>上午课程 (45分钟)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: var(--afternoon-bg);"></div>
                        <span>下午课程 (40分钟)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: var(--memorize-bg);"></div>
                        <span>生地背书</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: var(--break-bg);"></div>
                        <span>早读/晨练</span>
                    </div>
                </div>
            </div>

            <div class="card quote-card">
                <h3><i>💡</i> 每日箴言</h3>
                <div class="quote-text" id="dailyQuote">业精于勤，荒于嬉；行成于思，毁于随。</div>
                <div class="author" id="quoteAuthor">—— 韩愈</div>
            </div>
        </div>
    </div>

    <script>
        // 课程数据 - 完全按照您的要求配置
        const timetableData = {
            days: ['周一', '周二', '周三', '周四', '周五'],
            periods: [
                { name: '早读/晨练', time: '7:30-7:50', duration: 20, type: 'break' },
                { name: '第1节', time: '8:00-8:45', duration: 45, type: 'morning' },
                { name: '第2节', time: '8:55-9:40', duration: 45, type: 'morning' },
                { name: '第3节', time: '9:50-10:35', duration: 45, type: 'morning' },
                { name: '生地背书', time: '10:45-11:30', duration: 45, type: 'memorize' },
                { name: '第4节', time: '11:40-12:25', duration: 45, type: 'morning' },
                { name: '第5节', time: '14:40-15:20', duration: 40, type: 'afternoon' },
                { name: '第6节', time: '15:30-16:10', duration: 40, type: 'afternoon' },
                { name: '生地背书', time: '16:20-17:05', duration: 45, type: 'memorize' },
                { name: '第7节', time: '17:15-17:55', duration: 40, type: 'afternoon' },
                { name: '第8节', time: '18:05-18:45', duration: 40, type: 'afternoon' }
            ],
            courses: [
                // 周一
                ['升旗', '专题教育', '历史', '音乐', '生地背书', '体育', '语文', '数学', '生地背书', '综合实践', '英语'],
                // 周二
                ['英语早读', '英语', '道法', '物理', '生地背书', '生物', '体育', '美术', '生地背书', '语文', '数学'],
                // 周三
                ['生物早读', '生物', '语文', '道法', '生地背书', '地理', '英语', '体育', '生地背书', '数学', '物理'],
                // 周四
                ['语文早读', '语文', '英语', '地理', '生地背书', '信息科技', '数学', '数学', '生地背书', '物理', '生物'],
                // 周五
                ['跑操', '数学', '语文', '生物', '生地背书', '历史', '劳动', '心理健康', '生地背书', '英语', '地理']
            ]
        };

        // 每日箴言
        const dailyQuotes = [
            { text: "学而不思则罔，思而不学则殆。", author: "孔子" },
            { text: "书山有路勤为径，学海无涯苦作舟。", author: "韩愈" },
            { text: "读书破万卷，下笔如有神。", author: "杜甫" },
            { text: "黑发不知勤学早，白首方悔读书迟。", author: "颜真卿" },
            { text: "业精于勤，荒于嬉；行成于思，毁于随。", author: "韩愈" },
            { text: "一日之计在于晨，一年之计在于春。", author: "萧绎" },
            { text: "锲而不舍，金石可镂。", author: "荀子" }
        ];

        // 系统状态
        let systemState = {
            currentTime: new Date(),
            currentDay: 1,
            currentPeriod: -1,
            nextPeriod: -1,
            isSchoolDay: true
        };

        // DOM元素
        const canvas = document.getElementById('timetableCanvas');
        const ctx = canvas.getContext('2d');
        const notificationBanner = document.getElementById('notificationBanner');
        const countdownText = document.getElementById('countdownText');
        const statusIndicator = document.getElementById('statusIndicator');
        const currentDateEl = document.getElementById('currentDate');
        const currentWeekdayEl = document.getElementById('currentWeekday');
        const dailySummaryEl = document.getElementById('dailySummary');
        const dailyQuoteEl = document.getElementById('dailyQuote');
        const quoteAuthorEl = document.getElementById('quoteAuthor');
        const refreshBtn = document.getElementById('refreshBtn');
        const resetViewBtn = document.getElementById('resetViewBtn');

        // 颜色映射
        const colors = {
            headerBg: '#2c3e50',
            headerText: '#ffffff',
            morningBg: '#e3f2fd',
            afternoonBg: '#fff9e6',
            memorizeBg: '#e8f5e9',
            breakBg: '#f3e5f5',
            currentBorder: '#3498db',
            nextBorder: '#f39c12',
            border: '#bdc3c7',
            text: '#333333'
        };

        // 初始化系统
        function initSystem() {
            updateSystemTime();
            drawTimetable();
            updateSidebar();
            setupEventListeners();
            
            // 每秒更新一次
            setInterval(() => {
                updateSystemTime();
                drawTimetable();
                updateCountdown();
            }, 1000);
        }

        // 更新系统时间
        function updateSystemTime() {
            systemState.currentTime = new Date();
            const day = systemState.currentTime.getDay();
            
            systemState.currentDay = (day >= 1 && day <= 5) ? day : 1;
            systemState.isSchoolDay = (day >= 1 && day <= 5);
            
            const hours = systemState.currentTime.getHours();
            const minutes = systemState.currentTime.getMinutes();
            const totalMinutes = hours * 60 + minutes;
            
            systemState.currentPeriod = -1;
            systemState.nextPeriod = -1;
            
            // 查找当前课程
            for (let i = 0; i < timetableData.periods.length; i++) {
                const period = timetableData.periods[i];
                const [startHour, startMin] = period.time.split('-')[0].split(':').map(Number);
                const [endHour, endMin] = period.time.split('-')[1].split(':').map(Number);
                
                const startTime = startHour * 60 + startMin;
                const endTime = endHour * 60 + endMin;
                
                if (totalMinutes >= startTime && totalMinutes <= endTime) {
                    systemState.currentPeriod = i;
                    break;
                }
                
                if (totalMinutes < startTime && systemState.nextPeriod === -1) {
                    systemState.nextPeriod = i;
                }
            }
        }

        // 绘制课程表
        function drawTimetable() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const cellWidth = 140;
            const cellHeight = 55;
            const headerHeight = 70;
            const leftColWidth = 130;
            
            // 绘制表头
            ctx.fillStyle = colors.headerBg;
            ctx.fillRect(leftColWidth, 0, cellWidth * timetableData.days.length, headerHeight);
            
            ctx.fillStyle = colors.headerText;
            ctx.font = 'bold 20px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 绘制左上角
            ctx.fillStyle = colors.headerBg;
            ctx.fillRect(0, 0, leftColWidth, headerHeight);
            ctx.fillStyle = colors.headerText;
            ctx.font = 'bold 18px Microsoft YaHei';
            ctx.fillText('时间/星期', leftColWidth/2, headerHeight/2);
            
            // 绘制星期几
            ctx.font = 'bold 20px Microsoft YaHei';
            for (let i = 0; i < timetableData.days.length; i++) {
                const x = leftColWidth + i * cellWidth + cellWidth/2;
                const y = headerHeight/2;
                ctx.fillText(timetableData.days[i], x, y);
            }
            
            // 绘制时间段和课程
            for (let row = 0; row < timetableData.periods.length; row++) {
                const period = timetableData.periods[row];
                const y = headerHeight + row * cellHeight;
                
                // 确定背景色
                let bgColor = colors.morningBg;
                if (period.type === 'afternoon') bgColor = colors.afternoonBg;
                if (period.type === 'memorize') bgColor = colors.memorizeBg;
                if (period.type === 'break') bgColor = colors.breakBg;
                
                // 确定边框颜色和宽度
                let borderColor = colors.border;
                let borderWidth = 1;
                
                if (systemState.currentPeriod === row) {
                    borderColor = colors.currentBorder;
                    borderWidth = 4;
                } else if (systemState.nextPeriod === row) {
                    borderColor = colors.nextBorder;
                    borderWidth = 3;
                }
                
                // 绘制左侧时间列
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, y, leftColWidth, cellHeight);
                
                ctx.strokeStyle = borderColor;
                ctx.lineWidth = borderWidth;
                ctx.strokeRect(0, y, leftColWidth, cellHeight);
                
                // 绘制时间文本
                ctx.fillStyle = colors.text;
                ctx.font = 'bold 16px Microsoft YaHei';
                ctx.fillText(period.name, leftColWidth/2, y + cellHeight/2 - 12);
                ctx.font = '14px Microsoft YaHei';
                ctx.fillText(period.time, leftColWidth/2, y + cellHeight/2 + 12);
                
                // 绘制课程单元格
                for (let col = 0; col < timetableData.days.length; col++) {
                    const x = leftColWidth + col * cellWidth;
                    const course = timetableData.courses[col][row];
                    
                    ctx.fillStyle = bgColor;
                    ctx.fillRect(x, y, cellWidth, cellHeight);
                    
                    ctx.strokeStyle = borderColor;
                    ctx.lineWidth = borderWidth;
                    ctx.strokeRect(x, y, cellWidth, cellHeight);
                    
                    ctx.fillStyle = colors.text;
                    ctx.font = 'bold 18px Microsoft YaHei';
                    ctx.fillText(course, x + cellWidth/2, y + cellHeight/2);
                }
            }
            
            // 添加当前时间指示线
            addCurrentTimeIndicator(headerHeight, leftColWidth, cellWidth, cellHeight);
        }

        // 添加当前时间指示线
        function addCurrentTimeIndicator(headerHeight, leftColWidth, cellWidth, cellHeight) {
            const hours = systemState.currentTime.getHours();
            const minutes = systemState.currentTime.getMinutes();
            const seconds = systemState.currentTime.getSeconds();
            const totalMinutes = hours * 60 + minutes;
            
            for (let i = 0; i < timetableData.periods.length; i++) {
                const period = timetableData.periods[i];
                const [startHour, startMin] = period.time.split('-')[0].split(':').map(Number);
                const [endHour, endMin] = period.time.split('-')[1].split(':').map(Number);
                
                const startTime = startHour * 60 + startMin;
                const endTime = endHour * 60 + endMin;
                
                if (totalMinutes >= startTime && totalMinutes <= endTime) {
                    const ratio = (totalMinutes - startTime) / (endTime - startTime);
                    const y = headerHeight + i * cellHeight + ratio * cellHeight;
                    
                    ctx.beginPath();
                    ctx.moveTo(leftColWidth, y);
                    ctx.lineTo(leftColWidth + timetableData.days.length * cellWidth, y);
                    ctx.strokeStyle = '#e74c3c';
                    ctx.lineWidth = 4;
                    ctx.setLineDash([10, 5]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    ctx.fillStyle = '#e74c3c';
                    ctx.font = 'bold 16px Microsoft YaHei';
                    ctx.textAlign = 'left';
                    const timeStr = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
                    ctx.fillText(timeStr, leftColWidth + 15, y - 10);
                    ctx.textAlign = 'center';
                    
                    break;
                }
            }
        }

        // 更新倒计时显示
        function updateCountdown() {
            const now = systemState.currentTime;
            const day = now.getDay();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const totalMinutes = hours * 60 + minutes;
            
            let countdownMsg = "";
            let bgColor = colors.headerBg;
            let indicatorColor = '#3498db';
            
            // 周末处理
            if (day === 0 || day === 6) {
                countdownMsg = "📅 今天是周末，没有课程安排";
                bgColor = '#9b59b6';
                indicatorColor = '#9b59b6';
            } 
            // 上课日
            else if (day >= 1 && day <= 5) {
                const todayCourses = timetableData.courses[day - 1];
                let currentPeriod = systemState.currentPeriod;
                let nextPeriod = systemState.nextPeriod;
                
                if (currentPeriod !== -1) {
                    // 正在上课，显示下课倒计时
                    const period = timetableData.periods[currentPeriod];
                    const [endHour, endMin] = period.time.split('-')[1].split(':').map(Number);
                    const endTime = endHour * 60 + endMin;
                    const timeLeft = endTime - totalMinutes;
                    const minutesLeft = Math.floor(timeLeft);
                    const secondsLeft = 59 - seconds;
                    
                    countdownMsg = `📚 正在上：${todayCourses[currentPeriod]} | 下课还有 ${minutesLeft}分${secondsLeft}秒`;
                    bgColor = '#3498db';
                    indicatorColor = '#2ecc71';
                } else if (nextPeriod !== -1) {
                    // 课间休息，显示上课倒计时
                    const period = timetableData.periods[nextPeriod];
                    const [startHour, startMin] = period.time.split('-')[0].split(':').map(Number);
                    const startTime = startHour * 60 + startMin;
                    const timeToNext = startTime - totalMinutes;
                    const minutesToNext = Math.floor(timeToNext);
                    const secondsToNext = 59 - seconds;
                    
                    countdownMsg = `☕ 课间休息 | 距离下节 ${todayCourses[nextPeriod]} 还有 ${minutesToNext}分${secondsToNext}秒`;
                    bgColor = '#27ae60';
                    indicatorColor = '#f39c12';
                } else if (totalMinutes < 450) {
                    // 上课前
                    const [startHour, startMin] = timetableData.periods[0].time.split('-')[0].split(':').map(Number);
                    const startTime = startHour * 60 + startMin;
                    const timeToFirst = startTime - totalMinutes;
                    const minutesToFirst = Math.floor(timeToFirst);
                    const secondsToFirst = 59 - seconds;
                    
                    countdownMsg = `🌅 距离第一节课还有 ${minutesToFirst}分${secondsToFirst}秒`;
                    bgColor = '#2c3e50';
                    indicatorColor = '#3498db';
                } else {
                    // 课程结束
                    countdownMsg = "🎉 今日课程已全部结束";
                    bgColor = '#2c3e50';
                    indicatorColor = '#95a5a6';
                }
            }
            
            notificationBanner.style.background = bgColor;
            statusIndicator.style.backgroundColor = indicatorColor;
            countdownText.textContent = countdownMsg;
        }

        // 更新侧边栏
        function updateSidebar() {
            const now = systemState.currentTime;
            const day = now.getDay();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            
            currentDateEl.textContent = `${month}/${date}`;
            
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            currentWeekdayEl.textContent = weekdays[day];
            
            // 更新每日箴言
            const quoteIndex = now.getDate() % dailyQuotes.length;
            dailyQuoteEl.textContent = `"${dailyQuotes[quoteIndex].text}"`;
            quoteAuthorEl.textContent = `—— ${dailyQuotes[quoteIndex].author}`;
            
            // 更新课程摘要
            if (day >= 1 && day <= 5) {
                const todayCourses = timetableData.courses[day - 1];
                const totalClasses = todayCourses.filter(c => c && c !== '').length;
                const currentHour = now.getHours();
                
                let greeting = '';
                if (currentHour < 12) greeting = '上午好！';
                else if (currentHour < 18) greeting = '下午好！';
                else greeting = '晚上好！';
                
                dailySummaryEl.innerHTML = `${greeting}<br>今日共 <strong>${totalClasses}</strong> 节课。<br>当前是 ${timetableData.periods[systemState.currentPeriod]?.name || '休息时间'}。`;
            } else {
                dailySummaryEl.innerHTML = `今天是周末，没有课程安排。<br>可以好好休息，也可以适当复习功课。<br>劳逸结合，效率更高！`;
            }
        }

        // 设置事件监听器
        function setupEventListeners() {
            refreshBtn.addEventListener('click', () => {
                updateSystemTime();
                drawTimetable();
                updateCountdown();
                updateSidebar();
            });
            
            resetViewBtn.addEventListener('click', () => {
                const canvasWrapper = document.querySelector('.canvas-wrapper');
                canvasWrapper.scrollLeft = 0;
            });
        }

        // 初始化系统
        initSystem();
    </script>
</body>
</html>
