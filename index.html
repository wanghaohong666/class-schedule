<style>
/* ===== CSS Variables ===== */
:root {
  --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #ddd6fe 40%, #ede9fe 100%);
  --card-bg: rgba(255,255,255,0.72);
  --card-border: rgba(255,255,255,0.55);
  --card-shadow: 0 8px 32px rgba(99,102,241,0.12);
  --text-primary: #1e1b4b;
  --text-secondary: #6366f1;
  --text-muted: #7c7aaa;
  --accent: #6366f1;
  --accent-light: #a5b4fc;
  --accent-glow: rgba(99,102,241,0.35);
  --banner-bg: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
  --banner-text: #ffffff;
  --table-header-bg: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
  --table-header-text: #ffffff;
  --cell-morning: rgba(224,231,255,0.65);
  --cell-afternoon: rgba(253,230,138,0.45);
  --cell-memorize: rgba(167,243,208,0.45);
  --cell-break: rgba(233,213,255,0.50);
  --cell-hover: rgba(99,102,241,0.15);
  --cell-current: rgba(99,102,241,0.25);
  --cell-search-hit: rgba(250,204,21,0.40);
  --border-light: rgba(99,102,241,0.18);
  --tab-bg: rgba(255,255,255,0.50);
  --tab-active-bg: #6366f1;
  --tab-active-text: #ffffff;
  --tab-text: #6366f1;
  --modal-overlay: rgba(0,0,0,0.45);
  --modal-bg: rgba(255,255,255,0.94);
  --input-bg: rgba(255,255,255,0.65);
  --input-border: rgba(99,102,241,0.30);
  --btn-print-bg: #6366f1;
  --btn-print-text: #ffffff;
}

body.dark {
  --bg-gradient: linear-gradient(135deg, #0f0a2e 0%, #1a1035 40%, #0d0b22 100%);
  --card-bg: rgba(30,27,58,0.78);
  --card-border: rgba(99,102,241,0.22);
  --card-shadow: 0 8px 32px rgba(0,0,0,0.40);
  --text-primary: #e0e7ff;
  --text-secondary: #a5b4fc;
  --text-muted: #8b8ab0;
  --accent: #818cf8;
  --accent-light: #6366f1;
  --accent-glow: rgba(129,140,248,0.45);
  --banner-bg: linear-gradient(135deg, #2e1a6e 0%, #1e0f4a 100%);
  --banner-text: #e0e7ff;
  --table-header-bg: linear-gradient(135deg, #312e81 0%, #4c1d95 100%);
  --table-header-text: #e0e7ff;
  --cell-morning: rgba(49,46,129,0.35);
  --cell-afternoon: rgba(71,52,28,0.30);
  --cell-memorize: rgba(6,78,59,0.28);
  --cell-break: rgba(58,18,78,0.28);
  --cell-hover: rgba(129,140,248,0.18);
  --cell-current: rgba(129,140,248,0.30);
  --cell-search-hit: rgba(250,204,21,0.25);
  --border-light: rgba(129,140,248,0.22);
  --tab-bg: rgba(30,27,58,0.55);
  --tab-active-bg: #818cf8;
  --tab-active-text: #0f0a2e;
  --tab-text: #a5b4fc;
  --modal-overlay: rgba(0,0,0,0.65);
  --modal-bg: rgba(30,27,58,0.94);
  --input-bg: rgba(30,27,58,0.60);
  --input-border: rgba(129,140,248,0.35);
  --btn-print-bg: #818cf8;
  --btn-print-text: #0f0a2e;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; scroll-behavior:smooth; }
body {
  font-family:'Microsoft YaHei','PingFang SC','Helvetica Neue',sans-serif;
  background:var(--bg-gradient);
  min-height:100vh;
  color:var(--text-primary);
  transition:background 0.5s ease, color 0.4s ease;
  padding:16px;
  -webkit-tap-highlight-color:transparent;
}

/* ===== Banner ===== */
.banner {
  position:sticky; top:12px; z-index:900;
  background:var(--banner-bg);
  color:var(--banner-text);
  border-radius:16px;
  padding:14px 22px;
  display:flex; align-items:center; gap:12px;
  box-shadow:0 6px 24px rgba(99,102,241,0.35);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  transition:background 0.5s ease;
}
.banner-dot {
  width:13px; height:13px; border-radius:50%; flex-shrink:0;
}
.banner-dot.active { background:#34d399; animation:pulse-dot 1.2s infinite; }
.banner-dot.break  { background:#fbbf24; animation:pulse-dot 1.2s infinite; }
.banner-dot.idle   { background:#94a3b8; }
@keyframes pulse-dot {
  0%,100% { box-shadow:0 0 0 0 rgba(52,211,153,0.6); }
  50%     { box-shadow:0 0 0 10px rgba(52,211,153,0); }
}
.banner-text { font-size:1.05rem; font-weight:700; flex:1; }
.banner-time { font-size:0.9rem; opacity:0.85; font-variant-numeric:tabular-nums; }
/* banner variants */
.banner.holiday { background:linear-gradient(135deg, #f59e0b 0%, #ef4444 100%); }
.banner.weekend { background:linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%); }
.banner.preholiday { background:linear-gradient(135deg, #f97316 0%, #ef4444 100%); }

/* ===== Main Layout ===== */
.main-wrap {
  max-width:1400px; margin:6px auto 18px;
  display:flex; gap:22px; flex-wrap:wrap;
}
.timetable-col { flex:3; min-width:320px; }
.sidebar-col   { flex:1; min-width:260px; display:flex; flex-direction:column; gap:20px; }

/* ===== Card ===== */
.card {
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:18px;
  padding:18px 22px;
  box-shadow:var(--card-shadow);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  transition:background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
}

/* ===== Toolbar ===== */
.toolbar {
  display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:10px;
}
.search-box {
  flex:1; min-width:160px;
  background:var(--input-bg);
  border:1.5px solid var(--input-border);
  border-radius:12px;
  padding:10px 16px;
  font-size:0.95rem;
  color:var(--text-primary);
  outline:none;
  transition:all 0.25s ease;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.search-box::placeholder { color:var(--text-muted); }
.search-box:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
.btn {
  border:none; border-radius:12px; padding:10px 18px; font-size:0.9rem;
  font-weight:600; cursor:pointer; transition:all 0.25s ease;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:flex; align-items:center; gap:6px;
  white-space:nowrap;
}
.btn-theme {
  background:var(--tab-bg); color:var(--tab-text);
  border:1.5px solid var(--border-light);
}
.btn-theme:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn-print {
  background:var(--btn-print-bg); color:var(--btn-print-text);
  box-shadow:0 4px 14px var(--accent-glow);
}
.btn-print:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-notify {
  background:var(--tab-bg); color:var(--tab-text);
  border:1.5px solid var(--border-light);
}
.btn-notify:hover { background:#34d399; color:#fff; border-color:#34d399; }
.btn-notify.granted { background:#34d399; color:#fff; border-color:#34d399; }

/* ===== Day Tabs ===== */
.day-tabs {
  display:flex; gap:4px; margin-bottom:10px; flex-wrap:wrap;
  background:var(--tab-bg);
  border-radius:14px; padding:5px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.day-tab {
  flex:1; min-width:48px; text-align:center;
  padding:9px 4px; border-radius:10px; font-size:0.9rem;
  font-weight:600; cursor:pointer; border:none; background:transparent;
  color:var(--tab-text); transition:all 0.25s ease;
}
.day-tab:hover { background:rgba(99,102,241,0.18); }
.day-tab.active { background:var(--tab-active-bg); color:var(--tab-active-text); box-shadow:0 3px 10px var(--accent-glow); }

/* ===== Timetable Grid ===== */
.table-scroll { overflow-x:auto; border-radius:16px; }
.timetable {
  width:100%; border-collapse:separate; border-spacing:0;
  min-width:720px;
}
.timetable thead th {
  background:var(--table-header-bg);
  color:var(--table-header-text);
  padding:14px 8px; font-size:1rem; font-weight:700;
  position:sticky; top:0; z-index:2;
  text-align:center;
}
.timetable thead th:first-child {
  border-radius:14px 0 0 0;
  width:110px;
}
.timetable thead th:last-child { border-radius:0 14px 0 0; }
.timetable tbody td {
  padding:10px 6px; text-align:center; font-size:0.92rem;
  font-weight:600; cursor:pointer; position:relative;
  transition:all 0.3s ease;
  border-bottom:1px solid var(--border-light);
}
.timetable tbody td:first-child {
  font-size:0.8rem; line-height:1.4; cursor:default; font-weight:500;
  color:var(--text-muted); min-width:100px;
}
.timetable tbody td:first-child .period-name { font-weight:700; color:var(--text-primary); font-size:0.88rem; }
.timetable tbody td.cell-course:hover {
  background:var(--cell-hover); transform:scale(1.03); z-index:1;
  border-radius:8px; box-shadow:0 4px 16px var(--accent-glow);
}
/* cell types */
.cell-morning   { background:var(--cell-morning); }
.cell-afternoon { background:var(--cell-afternoon); }
.cell-memorize  { background:var(--cell-memorize); }
.cell-break     { background:var(--cell-break); }

/* current period pulse */
@keyframes pulse-glow {
  0%,100% { box-shadow:inset 0 0 0 0 var(--accent-glow), 0 0 0 0 var(--accent-glow); }
  50%     { box-shadow:inset 0 0 18px 3px var(--accent-glow), 0 0 20px 4px var(--accent-glow); }
}
.cell-current {
  background:var(--cell-current) !important;
  animation:pulse-glow 2s ease-in-out infinite;
  border-radius:8px;
  font-weight:800 !important;
}

/* search highlight */
.cell-hit {
  background:var(--cell-search-hit) !important;
  border-radius:8px;
  font-weight:800 !important;
}

/* ===== Sidebar ===== */
.date-big { font-size:3.2rem; font-weight:800; color:var(--accent); line-height:1; }
.weekday-label { font-size:1.2rem; color:var(--text-muted); margin:4px 0 16px; }
.summary-box { background:rgba(99,102,241,0.08); border-radius:14px; padding:18px; font-size:0.95rem; line-height:1.7; }
.legend-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px; }
.legend-item { display:flex; align-items:center; gap:8px; font-size:0.85rem; }
.legend-swatch { width:18px; height:18px; border-radius:5px; flex-shrink:0; }
.swatch-morning   { background:rgba(224,231,255,0.85); border:1px solid #a5b4fc; }
.swatch-afternoon { background:rgba(253,230,138,0.65); border:1px solid #fcd34d; }
.swatch-memorize  { background:rgba(167,243,208,0.65); border:1px solid #6ee7b7; }
.swatch-break     { background:rgba(233,213,255,0.70); border:1px solid #c4b5fd; }
.quote-card { background:linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); color:#fff; }
.quote-card h3 { color:#fff; border-bottom-color:rgba(255,255,255,0.3); }
.quote-text { font-style:italic; font-size:1.05rem; line-height:1.6; text-align:center; padding:12px 0; }
.quote-author { text-align:right; font-size:0.9rem; opacity:0.85; }

/* ===== Modal ===== */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:1000;
  background:var(--modal-overlay);
  align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
.modal-overlay.show { display:flex; }
.modal-box {
  background:var(--modal-bg);
  border:1px solid var(--card-border);
  border-radius:22px; padding:32px; max-width:420px; width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,0.35);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  text-align:center;
  animation:modal-in 0.3s ease;
}
@keyframes modal-in { from{opacity:0;transform:translateY(30px) scale(0.95);} to{opacity:1;transform:translateY(0) scale(1);} }
.modal-course { font-size:2rem; font-weight:800; color:var(--accent); margin-bottom:6px; }
.modal-period { font-size:1.1rem; color:var(--text-muted); margin-bottom:4px; }
.modal-time   { font-size:1.3rem; font-weight:700; color:var(--text-primary); margin-bottom:4px; }
.modal-day    { font-size:1rem; color:var(--text-muted); }
.modal-close {
  margin-top:20px; padding:10px 28px; border:none; border-radius:12px;
  background:var(--accent); color:#fff; font-size:1rem; font-weight:600; cursor:pointer;
  transition:all 0.25s ease;
}
.modal-close:hover { transform:scale(1.05); box-shadow:0 6px 20px var(--accent-glow); }

<script>
// ===== DATA =====
const timetableData = {
  days: ['周一','周二','周三','周四','周五'],
  periods: [
    { name:'早读/晨练', time:'7:30-7:50',  duration:20, type:'break' },

  courses: [
    ['升旗','专题教育','历史','音乐','体育','语文','数学','英语','地理','地理','生地背书'],
    ['英语早读','英语','道法','物理','生物','体育','美术','数学','数学','数学','生地背书'],
    ['生物早读','生物','语文','道法','地理','英语','体育','物理','语文','语文','生地背书'],
    ['语文早读','语文','英语','地理','信息科技','数学','数学','生物','生物','生物','生地背书'],
    ['跑操','数学','语文','生物','历史','劳动','心理健康','地理','地理','地理','生地背书']
  ]
};

const dailyQuotes = [
  { text:'学而不思则罔，思而不学则殆。', author:'孔子' },
  { text:'书山有路勤为径，学海无涯苦作舟。', author:'韩愈' },
  { text:'读书破万卷，下笔如有神。', author:'杜甫' },
  { text:'黑发不知勤学早，白首方悔读书迟。', author:'颜真卿' },
  { text:'业精于勤，荒于嬉；行成于思，毁于随。', author:'韩愈' },
  { text:'一日之计在于晨，一年之计在于春。', author:'萧绎' },
  { text:'锲而不舍，金石可镂。', author:'荀子' }
];

// ===== HOLIDAYS (2026 China) =====
const holidays = [
  { name:'寒假',        start:'2026-01-18', end:'2026-02-12', totalDays:26 },
  { name:'端午节',      start:'2026-06-19', end:'2026-06-21', totalDays:3  },
  { name:'暑假',        start:'2026-07-05', end:'2026-08-31', totalDays:58 },
  { name:'国庆中秋',    start:'2026-10-01', end:'2026-10-08', totalDays:8  }
];

function dateStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseDate(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }

function getHoliday(todayStr) {
  for (const h of holidays) {
    if (todayStr >= h.start && todayStr <= h.end) return h;
  }
  return null;
}

function getNextHoliday(todayStr) {
  for (const h of holidays) {
    if (h.start > todayStr) {
      // check if tomorrow is the start
      const tomorrow = new Date(parseDate(todayStr));
      tomorrow.setDate(tomorrow.getDate()+1);
      if (dateStr(tomorrow) === h.start) return h;
    }
  }
  return null;
}

function getFirstSchoolDayAfter(holidayEndStr) {
  let d = parseDate(holidayEndStr);
  d.setDate(d.getDate()+1);
  while (d.getDay()===0 || d.getDay()===6) d.setDate(d.getDate()+1);
  return d;
}

// ===== EXAM =====
const EXAM_DATE = new Date(2026, 6, 1); // 2026-07-01

function updateExamCountdown() {
  const now = new Date();
  const diff = Math.ceil((EXAM_DATE - now) / 86400000);
  const bar = document.getElementById('examBar');
  const daysEl = document.getElementById('examDays');
  if (diff > 0) {
    daysEl.textContent = diff;
    if (diff <= 7) { bar.classList.add('urgent'); }
    else { bar.classList.remove('urgent'); }
  } else if (diff === 0) {
    bar.textContent = '今天期末考试，加油！';
    bar.classList.add('urgent');
  } else {
    bar.textContent = '期末考试已结束';
    bar.classList.remove('urgent');
  }
}

// ===== THEME MANAGER =====
const THEME_KEY = 'class-schedule-theme';
const themes = ['default', 'mint', 'warm', 'morandi'];

function setTheme(name) {
  document.documentElement.removeAttribute('data-theme');
  if (name && name !== 'default') {
    document.documentElement.setAttribute('data-theme', name);
  }
  localStorage.setItem(THEME_KEY, name);
  // Update dots
  document.querySelectorAll('.theme-dot').forEach(d => {
    d.classList.toggle('active', d.dataset.theme === name);
  });
}

function initTheme() {
  const saved = localStorage.getItem(THEME_KEY) || 'default';
  setTheme(saved);
  // Bind clicks
  document.querySelectorAll('.theme-dot').forEach(d => {
    d.addEventListener('click', () => setTheme(d.dataset.theme));
  });
}

// ===== EXPORT TO IMAGE =====
function exportToImage() {
  const card = document.querySelector('.timetable-col .card');
  const rect = card.getBoundingClientRect();
  const scale = 2;
  const canvas = document.createElement('canvas');
  canvas.width = rect.width * scale;
  canvas.height = rect.height * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  // Draw background
  const style = getComputedStyle(document.body);
  ctx.fillStyle = 'transparent';
  ctx.fillRect(0, 0, rect.width, rect.height);

  // Manually render the table
  const table = document.getElementById('timetableTable');
  const tableRect = table.getBoundingClientRect();
  const offsetX = tableRect.left - rect.left;
  const offsetY = tableRect.top - rect.top;

  // Draw card background
  const cardStyle = getComputedStyle(card);
  ctx.fillStyle = cardStyle.backgroundColor || '#ffffff';
  roundRect(ctx, 0, 0, rect.width, rect.height, 18);
  ctx.fill();

  // Draw table
  drawTable(ctx, table, offsetX, offsetY);

  // Download
  const link = document.createElement('a');
  link.download = '初二1班课程表_' + new Date().toISOString().slice(0,10) + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawTable(ctx, table, ox, oy) {
  const rows = table.querySelectorAll('tr');
  const style = getComputedStyle(document.documentElement);
  const headerBg = '#6366f1';
  const textColor = '#1e1b4b';
  const mutedColor = '#7c7aaa';
  const fontFamily = '"Microsoft YaHei","PingFang SC",sans-serif';

  rows.forEach((row, ri) => {
    const cells = row.querySelectorAll('th, td');
    cells.forEach((cell, ci) => {
      const cr = cell.getBoundingClientRect();
      const x = cr.left - table.getBoundingClientRect().left + ox;
      const y = cr.top - table.getBoundingClientRect().top + oy;
      const w = cr.width;
      const h = cr.height;

      // Cell background
      if (ri === 0) {
        ctx.fillStyle = headerBg;
      } else if (ci === 0) {
        ctx.fillStyle = 'rgba(248,250,252,0.9)';
      } else {
        ctx.fillStyle = '#ffffff';
      }
      ctx.fillRect(x, y, w, h);

      // Text
      ctx.fillStyle = ri === 0 ? '#ffffff' : (ci === 0 ? mutedColor : textColor);
      ctx.font = (ri === 0 ? 'bold ' : '') + '14px ' + fontFamily;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(cell.textContent.trim(), x + w / 2, y + h / 2);

      // Border
      ctx.strokeStyle = '#e2e8f0';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, w, h);
    });
  });
}

// ===== STATE =====
let state = {
  activeDay: 0,        // 0-4 周一至周五
  currentPeriodIdx: -1,
  nextPeriodIdx: -1,
  searchQuery: '',

};

const $ = (id) => document.getElementById(id);
const banner = $('banner');
const bannerDot = $('bannerDot');
const bannerText = $('bannerText');
const bannerTime = $('bannerTime');

const searchInput = $('searchInput');
const currentDate = $('currentDate');
const currentWeekday = $('currentWeekday');
const dailySummary = $('dailySummary');
const dailyQuote = $('dailyQuote');
const quoteAuthor = $('quoteAuthor');

const modalCourse = $('modalCourse');
const modalPeriod = $('modalPeriod');
const modalTime = $('modalTime');
const modalDay = $('modalDay');

// ===== INIT =====
function init() {
  // Dark mode persistence
  initDarkMode();
  // Themes
  initTheme();

  // set today
  const now = new Date();
  const dow = now.getDay(); // 0=Sun, 6=Sat
  if (dow >= 1 && dow <= 5) {
    state.activeDay = dow - 1;
  } else {
    state.activeDay = 0; // default to Monday on weekend
  }

  buildDayTabs();
  buildTable();
  updateExamCountdown();
  updateAll();
  bindEvents();

  // refresh every second
  setInterval(updateAll, 1000);

  // exam countdown every minute
  setInterval(updateExamCountdown, 60000);

  // check notification every 30s
  setInterval(checkNotifications, 30000);
}

// ===== BUILD DAY TABS =====
function buildDayTabs() {
  dayTabs.innerHTML = '';
  timetableData.days.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === state.activeDay ? ' active' : '');
    btn.textContent = d;
    btn.addEventListener('click', () => {
      state.activeDay = i;
      document.querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      buildTable();
      updateAll();
    });
    dayTabs.appendChild(btn);
  });
}

// ===== BUILD TABLE =====
function buildTable() {
  // thead
  tableHead.innerHTML = '';
  const hr = document.createElement('tr');
  const th0 = document.createElement('th');
  th0.textContent = '时间/节次';
  hr.appendChild(th0);
  timetableData.days.forEach((d, i) => {
    const th = document.createElement('th');
    if (i === state.activeDay) {
      th.innerHTML = '<u>' + d + '</u>';
    } else {
      th.textContent = d;
    }
    hr.appendChild(th);
  });
  tableHead.innerHTML = '';
  tableHead.appendChild(hr);

  // tbody
  tableBody.innerHTML = '';
  for (let r = 0; r < timetableData.periods.length; r++) {
    const period = timetableData.periods[r];
    const tr = document.createElement('tr');
    tr.dataset.row = r;
    // time column
    const tdTime = document.createElement('td');
    tdTime.innerHTML = '<span class="period-name">' + period.name + '</span><br>' + period.time;
    tr.appendChild(tdTime);
    // course columns
    for (let c = 0; c < timetableData.days.length; c++) {
      const td = document.createElement('td');
      td.textContent = timetableData.courses[c][r];
      td.className = 'cell-course cell-' + period.type;
      td.dataset.day = c;
      td.dataset.period = r;
      td.addEventListener('click', () => showModal(c, r));
      tr.appendChild(td);
    }
    tableBody.appendChild(tr);
  }
}

// ===== UPDATE ALL =====
function updateAll() {
  const now = new Date();
  const dow = now.getDay();
  const hours = now.getHours();
  const minutes = now.getMinutes();
  const seconds = now.getSeconds();
  const totalMinutes = hours * 60 + minutes;

  // Update sidebar
  const month = now.getMonth() + 1;
  const date = now.getDate();
  currentDate.textContent = month + '/' + date;
  const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  currentWeekday.textContent = weekdays[dow];
  const qi = now.getDate() % dailyQuotes.length;
  dailyQuote.textContent = '"' + dailyQuotes[qi].text + '"';
  quoteAuthor.textContent = '—— ' + dailyQuotes[qi].author;

  // Find current/next period
  let cp = -1, np = -1;
  for (let i = 0; i < timetableData.periods.length; i++) {
    const p = timetableData.periods[i];
    const [sh, sm] = p.time.split('-')[0].split(':').map(Number);
    const [eh, em] = p.time.split('-')[1].split(':').map(Number);
    const st = sh * 60 + sm;
    const et = eh * 60 + em;
    if (totalMinutes >= st && totalMinutes <= et) { cp = i; break; }
    if (totalMinutes < st && np === -1) { np = i; }
  }
  state.currentPeriodIdx = cp;
  state.nextPeriodIdx = np;

  // Banner + Holiday / Weekend logic
  const todayStr = dateStr(now);
  const holiday = getHoliday(todayStr);
  const nextHoliday = getNextHoliday(todayStr);
  const isSchoolDay = (dow >= 1 && dow <= 5);
  let bannerMsg = '', dotClass = 'idle';
  const timeStr = hours.toString().padStart(2,'0') + ':' + minutes.toString().padStart(2,'0') + ':' + seconds.toString().padStart(2,'0');
  bannerTime.textContent = timeStr;

  // Clear banner classes
  banner.classList.remove('holiday','weekend','preholiday');

  if (holiday) {
    // ---- INSIDE HOLIDAY ----
    const endD = parseDate(holiday.end);
    const daysLeft = Math.ceil((endD - now) / 86400000);
    const firstDay = getFirstSchoolDayAfter(holiday.end);
    const fdDow = firstDay.getDay(); // 1-5
    const fdCourses = timetableData.courses[fdDow-1];
    const preview = fdCourses.slice(0,4).join('、');
    if (daysLeft <= 0) {
      bannerMsg = holiday.name + '最后一天！明天开学：' + preview;
    } else {
      bannerMsg = holiday.name + '假期中，还剩 ' + daysLeft + ' 天 | 开学第一天课程预览：' + preview;
    }
    dotClass = 'idle';
    banner.classList.add('holiday');
  } else if (nextHoliday && isSchoolDay && cp === -1 && np === -1) {
    // ---- PRE-HOLIDAY (all periods done, tomorrow is holiday) ----
    const lastPeriod = timetableData.periods[timetableData.periods.length-1];
    const [leh, lem] = lastPeriod.time.split('-')[1].split(':').map(Number);
    if (totalMinutes >= leh*60+lem) {
      bannerMsg = '即将放假！' + nextHoliday.name + '假期共 ' + nextHoliday.totalDays + ' 天';
      dotClass = 'idle';
      banner.classList.add('preholiday');
    }
  }

  // Fallback to normal logic if bannerMsg not set
  if (!bannerMsg) {
    if (!isSchoolDay) {
      // ---- WEEKEND (Sat/Sun) ----
      const monCourses = timetableData.courses[0];
      const preview = monCourses.slice(0,4).join('、');
      if (dow === 0) {
        bannerMsg = '周日 | 明天周一课程预览：' + preview;
      } else {
        // Saturday
        const daysToMon = 2; // Saturday -> 2 days to Monday
        bannerMsg = '周六 | 还剩 ' + daysToMon + ' 天到周一，课程预览：' + preview;
      }
      dotClass = 'idle';
      banner.classList.add('weekend');
    } else if (cp !== -1) {
      const p = timetableData.periods[cp];
      const [eh, em] = p.time.split('-')[1].split(':').map(Number);
      const et = eh * 60 + em;
      const left = et - totalMinutes;
      const leftMin = Math.floor(left);
      const leftSec = 59 - seconds;
      const courseName = timetableData.courses[dow - 1][cp];
      bannerMsg = '正在上课：' + courseName + ' | 下课还有 ' + leftMin + '分' + leftSec + '秒';
      dotClass = 'active';
    } else if (np !== -1) {
      const p = timetableData.periods[np];
      const [sh, sm] = p.time.split('-')[0].split(':').map(Number);
      const st = sh * 60 + sm;
      const left = st - totalMinutes;
      const leftMin = Math.floor(left);
      const leftSec = 59 - seconds;
      const courseName = timetableData.courses[dow - 1][np];
      bannerMsg = '课间休息 | 下节 ' + courseName + ' 还有 ' + leftMin + '分' + leftSec + '秒';
      dotClass = 'break';
    } else if (totalMinutes < 450) {
      const p = timetableData.periods[0];
      const [sh, sm] = p.time.split('-')[0].split(':').map(Number);
      const st = sh * 60 + sm;
      const left = st - totalMinutes;
      const leftMin = Math.floor(left);
      const leftSec = 59 - seconds;
      bannerMsg = '距离第一节课还有 ' + leftMin + '分' + leftSec + '秒';
      dotClass = 'idle';
    } else {
      bannerMsg = '今日课程已全部结束';
      dotClass = 'idle';
    }
  }

  bannerText.textContent = bannerMsg;
  bannerDot.className = 'banner-dot ' + dotClass;

  // Daily summary
  if (holiday) {
    dailySummary.innerHTML = '<strong>' + holiday.name + '</strong>假期中。<br>开学后共 <strong>11</strong> 节课/天。<br>好好休息，劳逸结合！';
  } else if (isSchoolDay) {
    const todayCourses = timetableData.courses[dow - 1];
    const totalClasses = todayCourses.filter(c => c && c !== '').length;
    let greeting = hours < 12 ? '上午好！' : hours < 18 ? '下午好！' : '晚上好！';
    let cpName = cp !== -1 ? timetableData.periods[cp].name : '休息时间';
    if (nextHoliday && cp===-1 && np===-1) {
      dailySummary.innerHTML = greeting + '<br>今日共 <strong>' + totalClasses + '</strong> 节课。<br>🎉 明天开始<strong>' + nextHoliday.name + '</strong>假期！';
    } else {
      dailySummary.innerHTML = greeting + '<br>今日共 <strong>' + totalClasses + '</strong> 节课。<br>当前是 ' + cpName + '。';
    }
  } else {
    const monCourses = timetableData.courses[0];
    const preview = monCourses.slice(0,4).join('、');
    dailySummary.innerHTML = '周末愉快！<br>周一课程预览：<strong>' + preview + '</strong><br>劳逸结合，效率更高！';
  }

  // Highlight cells
  highlightCells(isSchoolDay ? dow - 1 : -1, cp);
}

// ===== HIGHLIGHT CELLS =====
function highlightCells(todayIdx, cpIdx) {
  const allTds = tableBody.querySelectorAll('td.cell-course');
  const allRows = tableBody.querySelectorAll('tr');

  // Clear all
  allTds.forEach(td => td.classList.remove('cell-current', 'cell-current-td', 'cell-hit'));
  allRows.forEach(tr => tr.classList.remove('row-current'));

  // Row-level highlight: highlight the entire row of the current period
  if (cpIdx !== -1 && todayIdx !== -1 && todayIdx === state.activeDay) {
    allRows.forEach(tr => {
      if (parseInt(tr.dataset.row) === cpIdx) {
        tr.classList.add('row-current');
      }
    });
    allTds.forEach(td => {
      if (parseInt(td.dataset.day) === todayIdx && parseInt(td.dataset.period) === cpIdx) {
        td.classList.add('cell-current-td');
      }
    });
  }

  // Search highlight
  if (state.searchQuery.trim()) {
    const q = state.searchQuery.trim().toLowerCase();
    allTds.forEach(td => {
      if (td.textContent.toLowerCase().includes(q)) {
        td.classList.add('cell-hit');
      }
    });
  }
}

// ===== MODAL =====
function showModal(dayIdx, periodIdx) {
  const course = timetableData.courses[dayIdx][periodIdx];
  const period = timetableData.periods[periodIdx];
  modalCourse.textContent = course;
  modalPeriod.textContent = period.name;
  modalTime.textContent = period.time;
  modalDay.textContent = timetableData.days[dayIdx];
  modalOverlay.classList.add('show');
}

function hideModal() {
  modalOverlay.classList.remove('show');
}

// ===== NOTIFICATIONS =====
function requestNotification() {
  if (!('Notification' in window)) {
    alert('您的浏览器不支持桌面通知。');
    return;
  }
  if (Notification.permission === 'granted') {
    state.notifyGranted = true;
    updateNotifyBtn();
    return;
  }
  Notification.requestPermission().then(perm => {
    if (perm === 'granted') {
      state.notifyGranted = true;
      updateNotifyBtn();
    }
  });
}

function updateNotifyBtn() {
  const btn = $('btnNotify');
  const label = $('btnNotifyLabel');
  if (state.notifyGranted) {
    btn.classList.add('granted');
    label.textContent = '已开启';
  } else {
    btn.classList.remove('granted');
    label.textContent = '通知';
  }
}

function checkNotifications() {
  if (!state.notifyGranted) return;
  const now = new Date();
  const dow = now.getDay();
  if (dow < 1 || dow > 5) return;
  const hours = now.getHours();
  const minutes = now.getMinutes();
  const totalMinutes = hours * 60 + minutes;

  for (let i = 0; i < timetableData.periods.length; i++) {
    const p = timetableData.periods[i];
    const [sh, sm] = p.time.split('-')[0].split(':').map(Number);
    const st = sh * 60 + sm;
    const diff = st - totalMinutes;
    const key = (dow - 1) + '-' + i;
    if (diff > 0 && diff <= 5 && !state.notifiedPeriods[key]) {
      state.notifiedPeriods[key] = true;
      const course = timetableData.courses[dow - 1][i];
      new Notification('课程提醒', {
        body: '距离 ' + course + '（' + p.name + '）还有 ' + diff + ' 分钟，' + p.time,
        icon: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%236366f1%22 width=%22100%22 height=%22100%22 rx=%2220%22/%3E%3Ctext x=%2250%22 y=%2265%22 text-anchor=%22middle%22 font-size=%2245%22 fill=%22white%22%3E📅%3C/text%3E%3C/svg%3E'
      });
    }
  }

  // Reset notified keys for past periods (new day)
  Object.keys(state.notifiedPeriods).forEach(k => {
    const d = parseInt(k.split('-')[0]);
    if (d !== dow - 1) delete state.notifiedPeriods[k];
  });
}

// ===== THEME (Dark/Light) =====
function toggleTheme() {
  state.darkMode = !state.darkMode;
  document.body.classList.toggle('dark', state.darkMode);
  const icon = $('btnThemeIcon');
  const label = $('btnThemeLabel');
  if (state.darkMode) {
    icon.textContent = '☀️';
    label.textContent = '明亮';
  } else {
    icon.textContent = '🌙';
    label.textContent = '暗黑';
  }
  localStorage.setItem('class-schedule-dark', state.darkMode);
}
function initDarkMode() {
  const saved = localStorage.getItem('class-schedule-dark') === 'true';
  if (saved) { state.darkMode = true; document.body.classList.add('dark'); }
  const icon = $('btnThemeIcon');
  const label = $('btnThemeLabel');
  if (state.darkMode) { icon.textContent = '☀️'; label.textContent = '明亮'; }
}

// ===== EVENTS =====
function bindEvents() {
  // Theme (dark/light)
  $('btnTheme').addEventListener('click', toggleTheme);

  // Print
  $('btnPrint').addEventListener('click', () => window.print());

  // Export
  $('btnExport').addEventListener('click', exportToImage);

  // Notify
  $('btnNotify').addEventListener('click', requestNotification);

  // Search
  searchInput.addEventListener('input', () => {
    state.searchQuery = searchInput.value;
    const now = new Date();
    const dow = now.getDay();
    const isSchoolDay = (dow >= 1 && dow <= 5);
    highlightCells(isSchoolDay ? dow - 1 : -1, state.currentPeriodIdx);
  });

  // Modal close
  $('modalClose').addEventListener('click', hideModal);
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) hideModal();
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') hideModal();
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      searchInput.focus();
    }
  });
}

// ===== START =====
init();

// Try auto-request notification (some browsers allow)
if ('Notification' in window && Notification.permission === 'granted') {
  state.notifyGranted = true;
  updateNotifyBtn();
}
</script>
